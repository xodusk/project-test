<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유통기한 관리</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>유통기한 관리</h1>

        <input type="text" id="foodName" placeholder="식품 이름 입력" />
        <input type="date" id="expiryDate" />

        <button onclick="addFood()">추가</button>

        <p id="todayDate"></p>
        <p id="statusMessage"></p>

        <h3>카메라 입력</h3>

        <button onclick="startBarcodeMode()">상품명 스캔</button>
        <button onclick="startOcrMode()">유통기한 스캔</button>

        <video id="camera" autoplay playsinline></video>

        <button id="captureBtn" onclick="captureImage()" disabled>촬영</button>
        <button onclick="clearCamera()">촬영 종료</button>

        <canvas id="canvas" style="display:none;"></canvas>
        <img id="preview" style="width:100%; border-radius:12px; margin-top:10px;" />

        <h3>등록된 식품</h3>
        <h3>🟢 유통기한 남은 식품</h3>
<ul id="validList"></ul>

<h3>❌ 유통기한 지난 식품</h3>
<ul id="expiredList"></ul>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
