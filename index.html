<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유통기한 관리</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1554/1554401.png">
</head>
<body>
    <div class="container">
        <h1>유통기한 관리</h1>

        <input type="text" id="foodName" placeholder="식품 이름 입력" />
        <input type="date" id="expiryDate" />

        <button onclick="addFood()">추가</button>

        <p id="todayDate"></p>
        <p id="statusMessage"></p>

        <h3>카메라 입력</h3>
        <button onclick="startBarcodeMode()">상품명 스캔</button>
        <button onclick="startOcrMode()">유통기한 스캔</button>

        <video id="camera" autoplay playsinline></video>
        <button id="captureBtn" onclick="captureImage()" disabled>촬영</button>
        <button onclick="clearCamera()">촬영 종료</button>

        <canvas id="canvas" style="display:none;"></canvas>
        <img id="preview" style="width:100%; border-radius:12px; margin-top:10px; display:none;" />

        <hr>

        <h3>등록된 식품</h3>
        <h3>🟢 유통기한 남은 식품</h3>
        <ul id="validList"></ul>

        <h3>❌ 유통기한 지난 식품</h3>
        <ul id="expiredList"></ul>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('서비스 워커 등록 성공:', reg.scope))
                    .catch(err => console.error('서비스 워커 등록 실패:', err));
            });
        }
    </script>
</body>
</html>
