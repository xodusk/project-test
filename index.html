<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유통기한 관리</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>유통기한 관리</h1>

        <!-- 입력 -->
        <input type="text" id="foodName" placeholder="식품 이름 입력" />
        <input type="date" id="expiryDate" />

        <button onclick="addFood()">추가</button>

        <p id="todayDate"></p>
        <p id="statusMessage"></p>

        <!-- 🔥 모드 선택 -->
        <h3>카메라로 입력</h3>

        <div class="mode-buttons">
            <button id="barcodeBtn" onclick="setMode('barcode')">바코드 스캔</button>
            <button id="ocrBtn" onclick="setMode('ocr')">유통기한 스캔</button>
        </div>

        <!-- 카메라 -->
        <video id="camera" autoplay playsinline></video>

        <button id="cameraBtn" onclick="startCamera()">카메라 켜기</button>
        <button id="captureBtn" onclick="captureImage()" disabled>촬영</button>
        <button onclick="clearCamera()">촬영 삭제</button>

        <!-- 숨김 캔버스 (OCR & 바코드용) -->
        <canvas id="canvas" style="display:none;"></canvas>

        <!-- 리스트 -->
        <h3>등록된 식품</h3>
        <ul id="foodList"></ul>
    </div>

    <!-- 🔥 라이브러리 -->
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
