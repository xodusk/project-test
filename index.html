<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유통기한 관리</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>유통기한 관리</h1>

        <input type="text" id="foodName" placeholder="식품 이름 입력" />
        <input type="date" id="expiryDate" />

        <button onclick="addFood()">추가</button>
     

        <p id="todayDate"></p>
        <p id="statusMessage"></p>

        <h3>카메라로 입력</h3>
        <video id="camera" autoplay playsinline></video>
        <button id="cameraBtn" onclick="startCamera()">카메라 켜기</button>
        <button id="captureBtn" onclick="captureImage()" disabled>촬영</button>
        <button onclick="clearCamera()">촬영 삭제</button>

        <h3>등록된 식품</h3>
        <ul id="foodList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
